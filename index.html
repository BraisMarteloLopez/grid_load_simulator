<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Load Simulator</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="app-header">
        <h1>Grid Load Simulator</h1>
    </header>

    <main class="app-layout">
        <!-- Salida visual: el grid, centrado -->
        <section class="grid-panel">
            <canvas id="grid-canvas" width="480" height="480"></canvas>
        </section>

        <!-- Panel lateral derecho -->
        <aside class="sidebar">
            <!-- Controles configurables (arriba) -->
            <section class="panel controls-panel">
                <h2>Controles</h2>
                <div class="panel-body" id="controls-body">
                    <div class="control-row">
                        <label for="point-count">Número de puntos</label>
                        <input type="number" id="point-count" min="0" max="500" value="8">
                    </div>
                    <button type="button" id="reset-btn" class="btn">Reset (aplicar)</button>
                </div>
            </section>

            <!-- Resultados (debajo) -->
            <section class="panel results-panel">
                <h2>Resultados</h2>
                <div class="panel-body" id="results-body">
                    <p class="placeholder">Sin resultados todavía.</p>
                </div>
            </section>
        </aside>
    </main>

    <!-- Información sobre la ejecución (sección propia, separada de Controles/Resultados) -->
    <footer class="exec-info">
        <span class="exec-info-label">Información de ejecución</span>
        <span class="exec-info-item">FPS: <strong id="fps-value">—</strong></span>
        <span class="exec-info-item">Zoom: <strong id="zoom-value">100%</strong></span>
        <span class="exec-info-hint">Rueda = zoom · Arrastrar = mover · Reset = vista inicial</span>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/grid.js"></script>
    <script src="js/point.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
